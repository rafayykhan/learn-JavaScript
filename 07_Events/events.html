<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Events</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
      }

      #images {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding: 0;
      }

      #images li {
        width: 250px;
      }

      #images img {
        width: 100%;
        height: 350px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s;
      }

      #images img:hover {
        transform: scale(1.05);
      }

      p {
        margin-top: 8px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Amazing Images</h1>

    <div>
      <ul id="images">
        <li id="naruto">
          <img
            src="https://cdn.myanimelist.net/images/anime/13/17405.jpg"
            alt="Naruto"
          />
        </li>

        <li id="onepiece">
          <img
            src="https://cdn.myanimelist.net/images/anime/6/73245.jpg"
            alt="One Piece"
          />
        </li>

        <li id="attackontitan">

            src="https://cdn.myanimelist.net/images/anime/10/47347.jpg"

          />

        <li id="jujutsukaisen">
          <img
            src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg"
            alt="Jujutsu Kaisen"
          />
        </li>

        <li id="deathnote">

          />
        </li>

        <li>

        </li>
      </ul>
    </div>
  </body>

    // prevent default
    /*
    event.preventDefault() stops the browser's default action for an event.

    Think of it this way:

    An event occurs (click, submit, key press, etc.).
    The browser has a built-in behavior for that event.
    preventDefault() tells the browser: "Don't do the built-in behavior; I'll handle it myself."
    */

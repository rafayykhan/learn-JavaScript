<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Relation</title>
    <style>
      .bg-color {
        background-color: black;
        color: aliceblue;
      }
    </style>
  </head>
  <body class="bg-color"></body>
  <script>
    // Create a new <div> element in memory
    // At this point it is NOT visible on the webpage yet
    const div = document.createElement("div");

    // Print the div object in the console
    console.log(div);

    // Add a class named "main" to the div
    // Result: <div class="main"></div>
    div.className = "main";

    // Generate a random id between 1 and 11
    // Math.random() -> 0 to 1
    // * 10 -> 0 to 10
    // + 1 -> 1 to 11
    // Math.round() rounds it to the nearest integer
    div.id = Math.round(Math.random() * 10 + 1);

    // Add an HTML attribute to the div
    // Result: title="the title has been generated"
    // If you hover over the div, this text will appear as a tooltip
    div.setAttribute("title", "the title has been generated");

    // Change the background color of the div
    div.style.backgroundColor = "Cyan";

    // Change the text color of the div
    div.style.color = "Black";

    // Create a text node containing the given text
    // Text node is created separately before adding it to the div
    const addtext = document.createTextNode("Hey its me Rafay khan");

    // Add the text node inside the div
    // Result:
    // <div>Hey its me Rafay khan</div>
    div.appendChild(addtext);

    // Add the completed div to the end of the <body>
    // This is the moment the div becomes visible on the webpage
    document.body.appendChild(div);
  </script>
</html>

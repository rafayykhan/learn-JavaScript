<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background-color: white;
        padding: 30px 40px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        width: 320px;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      .input-row {
        display: flex;
        margin-bottom: 15px;
      }

      #taskInput {
        flex: 1;
        padding: 8px;
        font-size: 16px;
      }

      #addBtn {
        padding: 8px 15px;
        font-size: 16px;
        background-color: green;
        color: white;
        border: none;
        cursor: pointer;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid #ccc;
        font-size: 16px;
      }

      li.done span {
        text-decoration: line-through;
        color: gray;
      }

      li button {
        background-color: red;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>To-Do List</h1>

      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Enter a task..." />
        <button id="addBtn">Add</button>
      </div>

      <ul id="taskList"></ul>
    </div>

    <script>
      // grab the elements we need
      const taskInput = document.getElementById("taskInput");
      const addBtn = document.getElementById("addBtn");
      const taskList = document.getElementById("taskList");

      // runs every time we click "Add"
      addBtn.addEventListener("click", function () {
        const taskText = taskInput.value;

        // don't add empty tasks
        if (taskText === "") {
          return;
        }

        addTask(taskText);

        // clear the input box after adding
        taskInput.value = "";
      });

      // create a new <li> and add it to the list
      function addTask(taskText) {
        // create the list item
        const li = document.createElement("li");

        // create the text part
        const span = document.createElement("span");
        span.textContent = taskText;

        // clicking the text marks the task done / not done
        span.addEventListener("click", function () {
          li.classList.toggle("done");
        });

        // create the delete button
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";

        // clicking delete removes this task from the list
        deleteBtn.addEventListener("click", function () {
          li.remove();
        });

        // put the span and button inside the li
        li.appendChild(span);
        li.appendChild(deleteBtn);

        // put the li inside the ul
        taskList.appendChild(li);
      }
    </script>
  </body>
</html>
